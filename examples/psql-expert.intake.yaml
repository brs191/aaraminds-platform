# Agent intake for the PostgreSQL / PL-pgSQL expert agent.
# Scope: advise and draft only — never touches a live database.
# Validated against schemas/agent-intake.schema.json by `aapctl intake`.
agent_id: aara-psql-expert
submitted_by: rajashekar.b@gmail.com
submitted_at: "2026-07-05T16:00:00Z"
business_problem: >-
  Teams write, review, and optimize PostgreSQL stored procedures (PL/pgSQL),
  functions, triggers, and complex queries by hand, with inconsistent quality,
  no shared review discipline, and frequent correctness and performance defects.
  Expertise is uneven and schema knowledge is often assumed rather than verified,
  which produces subtly wrong SQL that fails only in production.
owners:
  business_owner: Raja Shekar Bollam
  technical_owner: Raja Shekar Bollam (acting engineering lead)
users:
  - Backend Engineer
  - Database Developer
  - Data Platform Lead
expected_outcomes:
  - Reviewed, evidence-grounded PL/pgSQL and SQL drafts produced from provided schema
  - Every schema or behavior claim cited to the provided DDL, never assumed
  - Performance and correctness issues flagged with a rationale before code is run
execution_intent: draft-outputs
proposed_tools:
  - tool_name: get_schema_context
    action_type: schema_context_read
    writes: false
    description: >-
      Read provided schema DDL, migration files, and table/column/constraint
      definitions supplied for the engagement. Reads files only — never a live database.
  - tool_name: search_sql_knowledge
    action_type: sql_knowledge_search
    writes: false
    description: >-
      Search an approved PostgreSQL knowledge base (official documentation, patterns,
      and internal SQL standards) for relevant guidance.
  - tool_name: create_sql_draft
    action_type: sql_draft_create
    writes: true
    description: >-
      Produce a reviewed PL/pgSQL or SQL draft document (stored procedure, function,
      trigger, migration, or query) with cited rationale, for human review. Never executes SQL.
data_domains:
  - domain: schema-definitions
    authoritative_source: engagement-provided DDL and migration repository
    classification: client-confidential
  - domain: postgresql-knowledge
    authoritative_source: PostgreSQL official documentation and internal SQL standards
    classification: public
  - domain: sql-drafts
    authoritative_source: agent blueprint repository
    classification: client-confidential
risks:
  - Hallucinated column names, types, or functions if schema is not verified from source
  - Generated dynamic SQL vulnerable to injection if not parameterized
  - Draft advice may be over-trusted; every claim must cite the provided schema
  - Client schema definitions must never leak across engagements
approval_needs: >-
  Draft creation is soft-gated (interactive confirmation). This agent never executes
  SQL against any database; any future execution tool would require a hard boundary
  and separate security sign-off, and is out of scope for this intake.
classification_inputs:
  action_risk: low
  data_sensitivity: client-confidential
  reversibility: reversible
  user_impact: medium
  financial_impact: low
  production_impact: low
