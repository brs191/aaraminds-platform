name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.5"

      - name: Verify platform formatting
        run: |
          files="$(gofmt -l ./platform)"
          if [ -n "$files" ]; then
            echo "$files"
            exit 1
          fi

      - name: Test platform
        working-directory: platform
        run: |
          go mod download
          go test ./...
          go test -race ./...
          go vet ./...
          go run ./cmd/aapctl validate
          go run ./cmd/aapctl contracts
          go run ./cmd/aapctl mcp-tools
          go run ./cmd/aapctl prove

      - name: Agent Factory pipeline
        working-directory: platform
        run: |
          go build -o /tmp/aapctl ./cmd/aapctl
          /tmp/aapctl intake -root ..
          /tmp/aapctl classify -root ..
          /tmp/aapctl sections -root .. -dir agents/aara-business-analyst

      - name: Readiness gate (defer allowed, block fails)
        working-directory: platform
        run: |
          # aapctl readiness exit codes: 0 pass, 3 defer, 4 block, 1 error.
          # A PR may leave the BA agent deferred, but must never block it or
          # break the engine. go run wraps exit codes, so use the built binary.
          set +e
          /tmp/aapctl readiness -root ..
          code=$?
          set -e
          if [ "$code" -ne 0 ] && [ "$code" -ne 3 ]; then
            echo "readiness exited $code (block or error) — failing CI"
            exit 1
          fi

      - name: Verify MCP server formatting
        run: |
          files="$(gofmt -l ./skills-pack/examples/microservices-system-design-mcp-server/cmd ./skills-pack/examples/microservices-system-design-mcp-server/internal)"
          if [ -n "$files" ]; then
            echo "$files"
            exit 1
          fi

      - name: Test MCP server
        working-directory: skills-pack/examples/microservices-system-design-mcp-server
        run: |
          go mod download
          go test ./...
          go test -race ./...
          go vet ./...
          go build -buildvcs=false -o ./mcp-server ./cmd/server

      - name: Validate architecture review demo goldens
        working-directory: skills-pack/demo/architecture-review-demo
        env:
          MCP_SERVER_BIN: ../../examples/microservices-system-design-mcp-server/mcp-server
        run: |
          make demo
          make validate
