{
  "tool_name": "create_requirements_draft",
  "contract_version": "1.0.0",
  "action_type": "requirements_draft_create",
  "purpose": "Create a non-production requirements draft from cited BA Agent evidence.",
  "input_schema": {
    "type": "object",
    "required": ["engagement_id", "title", "evidence_refs"],
    "properties": {
      "engagement_id": { "type": "string", "minLength": 1 },
      "title": { "type": "string", "minLength": 1 },
      "evidence_refs": {
        "type": "array",
        "minItems": 1,
        "items": { "type": "string", "minLength": 1 }
      }
    },
    "additionalProperties": false
  },
  "output_schema": { "type": "object", "required": ["draft_ref", "status"] },
  "permissions_required": ["requirements:draft:create"],
  "approval_boundary": "soft",
  "data_classification": { "input": "client-confidential", "output": "client-confidential" },
  "failure_modes": [
    {
      "code": "APPROVAL_REQUIRED",
      "meaning": "Draft creation requires an authenticated interactive user confirmation.",
      "retryable": true,
      "safe_user_message": "Please confirm before creating the requirements draft."
    }
  ],
  "timeout_ms": 10000,
  "timeout_class": "interactive",
  "retry_policy": { "max_attempts": 0, "backoff": "none" },
  "audit_event_schema": {
    "type": "object",
    "required": ["run_id", "tool_name", "engagement_id", "input_hash", "outcome", "timestamp"],
    "properties": {
      "run_id": { "type": "string", "minLength": 1 },
      "tool_name": { "type": "string", "const": "create_requirements_draft" },
      "engagement_id": { "type": "string", "minLength": 1 },
      "run_engagement_id": { "type": "string", "minLength": 1 },
      "input_hash": { "type": "string", "minLength": 1 },
      "outcome": { "type": "string", "enum": ["success", "denied", "approval_required"] },
      "timestamp": { "type": "string", "format": "date-time" },
      "reason": { "type": "string" },
      "approval_boundary": { "type": "string" },
      "original_boundary": { "type": "string" },
      "runtime_mode": { "type": "string" },
      "action_type": { "type": "string" }
    },
    "additionalProperties": false
  },
  "example_invocation": { "engagement_id": "eng-example-001", "title": "Sample discovery requirements", "evidence_refs": ["source://example/discovery-note"] }
}
