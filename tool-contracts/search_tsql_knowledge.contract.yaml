{
  "tool_name": "search_tsql_knowledge",
  "contract_version": "1.0.0",
  "action_type": "tsql_knowledge_search",
  "purpose": "Search an approved T-SQL / SQL Server knowledge base (Microsoft Learn, patterns, internal standards) for read-only guidance.",
  "input_schema": {
    "type": "object",
    "required": ["engagement_id", "query"],
    "properties": {
      "engagement_id": { "type": "string", "minLength": 1 },
      "query": { "type": "string", "minLength": 1 },
      "max_results": { "type": "integer", "minimum": 1, "maximum": 50 }
    },
    "additionalProperties": false
  },
  "output_schema": {
    "type": "object",
    "required": ["results", "source_system"],
    "properties": {
      "results": {
        "type": "array",
        "items": {
          "type": "object",
          "required": ["title", "excerpt", "source_ref", "confidence"],
          "properties": {
            "title": { "type": "string", "minLength": 1 },
            "excerpt": { "type": "string", "minLength": 1 },
            "source_ref": { "type": "string", "minLength": 1 },
            "confidence": { "type": "number", "minimum": 0, "maximum": 1 }
          },
          "additionalProperties": false
        }
      },
      "source_system": { "type": "string", "minLength": 1 }
    },
    "additionalProperties": false
  },
  "permissions_required": ["tsql_knowledge:read"],
  "approval_boundary": "none",
  "data_classification": { "input": "internal", "output": "public" },
  "failure_modes": [
    {
      "code": "ENGAGEMENT_SCOPE_MISMATCH",
      "meaning": "Requested engagement_id does not match active run context.",
      "retryable": false,
      "safe_user_message": "The request was blocked because it tried to access a different engagement scope."
    }
  ],
  "timeout_ms": 5000,
  "timeout_class": "interactive",
  "retry_policy": { "max_attempts": 2, "backoff": "exponential" },
  "audit_event_schema": {
    "type": "object",
    "required": ["run_id", "tool_name", "engagement_id", "input_hash", "outcome", "timestamp"],
    "properties": {
      "run_id": { "type": "string", "minLength": 1 },
      "tool_name": { "type": "string", "const": "search_tsql_knowledge" },
      "engagement_id": { "type": "string", "minLength": 1 },
      "run_engagement_id": { "type": "string", "minLength": 1 },
      "input_hash": { "type": "string", "minLength": 1 },
      "outcome": { "type": "string", "enum": ["success", "denied", "approval_required"] },
      "timestamp": { "type": "string", "format": "date-time" },
      "reason": { "type": "string" },
      "approval_boundary": { "type": "string" },
      "original_boundary": { "type": "string" },
      "runtime_mode": { "type": "string" },
      "action_type": { "type": "string" },
      "output_hash": { "type": "string" },
      "elapsed_ms": { "type": "integer" },
      "attempts": { "type": "integer" }
    },
    "additionalProperties": false
  },
  "example_invocation": { "engagement_id": "eng-example-001", "query": "sql server parameter sniffing optimize for recompile", "max_results": 5 }
}
